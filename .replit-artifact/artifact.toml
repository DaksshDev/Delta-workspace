kind = "web"
previewPath = "/"
title = "Delta Board"
version = "1.0.0"
id = "artifacts/delta-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22409

[services.development]
run = "pnpm --filter @workspace/delta-board run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/delta-board", "run", "build" ]
publicDir = "artifacts/delta-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22409"
BASE_PATH = "/"
